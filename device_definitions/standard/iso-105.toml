# ISO 105-Key Keyboard Definition
# European/International keyboard layout with 105 keys
# This is a generic definition that can be used as a fallback for ISO layout keyboards

name = "ISO 105-Key Keyboard"
vendor_id = 0xFFFF  # Generic vendor ID
product_id = 0x0002  # Generic product ID
manufacturer = "Generic"

[layout]
layout_type = "standard"
rows = 6
# ISO keyboard has irregular column counts per row
cols_per_row = [15, 14, 14, 14, 13, 8]

[visual]
key_width = 60
key_height = 60
key_spacing = 4

# Matrix map: scancode -> [row, col]
# Using Linux scancodes / USB HID usage codes
# Row 0: Function and Escape keys
[matrix_map]
"1" = [0, 0]    # ESC
"59" = [0, 2]   # F1
"60" = [0, 3]   # F2
"61" = [0, 4]   # F3
"62" = [0, 5]   # F4
"63" = [0, 6]   # F5
"64" = [0, 7]   # F6
"65" = [0, 8]   # F7
"66" = [0, 9]   # F8
"67" = [0, 10]  # F9
"68" = [0, 11]  # F10
"87" = [0, 12]  # F11
"88" = [0, 13]  # F12
"99" = [0, 14]  # Print Screen

# Row 1: Number row
"41" = [1, 0]   # ` (grave/tilde)
"2" = [1, 1]    # 1
"3" = [1, 2]    # 2
"4" = [1, 3]    # 3
"5" = [1, 4]    # 4
"6" = [1, 5]    # 5
"7" = [1, 6]    # 6
"8" = [1, 7]    # 7
"9" = [1, 8]    # 8
"10" = [1, 9]   # 9
"11" = [1, 10]  # 0
"12" = [1, 11]  # - (minus)
"13" = [1, 12]  # = (equals)
"14" = [1, 13]  # Backspace

# Row 2: QWERTY row
"15" = [2, 0]   # Tab
"16" = [2, 1]   # Q
"17" = [2, 2]   # W
"18" = [2, 3]   # E
"19" = [2, 4]   # R
"20" = [2, 5]   # T
"21" = [2, 6]   # Y
"22" = [2, 7]   # U
"23" = [2, 8]   # I
"24" = [2, 9]   # O
"25" = [2, 10]  # P
"26" = [2, 11]  # [ (left bracket)
"27" = [2, 12]  # ] (right bracket)
"28" = [2, 13]  # Enter (ISO enter spans rows 2-3)

# Row 3: ASDF row (home row)
"58" = [3, 0]   # Caps Lock
"30" = [3, 1]   # A
"31" = [3, 2]   # S
"32" = [3, 3]   # D
"33" = [3, 4]   # F
"34" = [3, 5]   # G
"35" = [3, 6]   # H
"36" = [3, 7]   # J
"37" = [3, 8]   # K
"38" = [3, 9]   # L
"39" = [3, 10]  # ; (semicolon)
"40" = [3, 11]  # ' (apostrophe)
"43" = [3, 12]  # # (ISO hash key - right of apostrophe)
# Note: Enter key physically spans from row 2, col 13 to row 3, col 13

# Row 4: ZXCV row
"42" = [4, 0]   # Left Shift
"86" = [4, 1]   # ISO extra key (< > |) - between left shift and Z
"44" = [4, 2]   # Z
"45" = [4, 3]   # X
"46" = [4, 4]   # C
"47" = [4, 5]   # V
"48" = [4, 6]   # B
"49" = [4, 7]   # N
"50" = [4, 8]   # M
"51" = [4, 9]   # , (comma)
"52" = [4, 10]  # . (period)
"53" = [4, 11]  # / (forward slash)
"54" = [4, 12]  # Right Shift

# Row 5: Bottom row (modifiers and space)
"29" = [5, 0]   # Left Ctrl
"125" = [5, 1]  # Left Meta/Super/Win
"56" = [5, 2]   # Left Alt
"57" = [5, 3]   # Space
"100" = [5, 4]  # Right Alt (AltGr)
"126" = [5, 5]  # Right Meta/Super/Win
"127" = [5, 6]  # Menu/Application
"97" = [5, 7]   # Right Ctrl
