# Elgato Stream Deck MK.2 Device Definition
# 15-key macro pad with LCD buttons arranged in a 3×5 grid

name = "Elgato Stream Deck MK.2"
vendor_id = 0x0fd9
product_id = 0x0080
manufacturer = "Elgato"

[layout]
layout_type = "matrix"
rows = 3
cols = 5

[visual]
key_width = 72
key_height = 72
key_spacing = 18

# Matrix map: scancode -> [row, col]
# Stream Deck uses custom HID protocol with button indices 0-14
# Mapping button indices to physical positions
[matrix_map]
"0" = [0, 0]    # Button 1 (top-left)
"1" = [0, 1]    # Button 2
"2" = [0, 2]    # Button 3
"3" = [0, 3]    # Button 4
"4" = [0, 4]    # Button 5 (top-right)
"5" = [1, 0]    # Button 6
"6" = [1, 1]    # Button 7
"7" = [1, 2]    # Button 8 (center)
"8" = [1, 3]    # Button 9
"9" = [1, 4]    # Button 10
"10" = [2, 0]   # Button 11 (bottom-left)
"11" = [2, 1]   # Button 12
"12" = [2, 2]   # Button 13
"13" = [2, 3]   # Button 14
"14" = [2, 4]   # Button 15 (bottom-right)
