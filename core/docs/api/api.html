<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rhai API Documentation - KeyRx</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-color: #2563eb;
            --bg-color: #ffffff;
            --text-color: #1f2937;
            --border-color: #e5e7eb;
            --code-bg: #f3f4f6;
            --link-color: #2563eb;
            --deprecated-bg: #fef3c7;
            --deprecated-border: #f59e0b;
            --search-bg: #f9fafb;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #1f2937;
                --text-color: #f9fafb;
                --border-color: #374151;
                --code-bg: #374151;
                --search-bg: #111827;
                --deprecated-bg: #78350f;
                --deprecated-border: #f59e0b;
            }
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
                'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
            line-height: 1.6;
            color: var(--text-color);
            background-color: var(--bg-color);
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            padding: 40px 0;
            border-bottom: 2px solid var(--border-color);
            margin-bottom: 30px;
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            color: var(--primary-color);
        }

        .subtitle {
            font-size: 1.2em;
            color: #6b7280;
        }

        .search-container {
            margin: 30px 0;
            position: relative;
        }

        #search-input {
            width: 100%;
            padding: 15px 20px;
            font-size: 1em;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            background-color: var(--search-bg);
            color: var(--text-color);
        }

        #search-input:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        #search-results {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            max-height: 400px;
            overflow-y: auto;
            background: var(--bg-color);
            border: 2px solid var(--border-color);
            border-radius: 8px;
            margin-top: 5px;
            display: none;
            z-index: 1000;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        #search-results.show {
            display: block;
        }

        .search-result-item {
            padding: 12px 20px;
            cursor: pointer;
            border-bottom: 1px solid var(--border-color);
        }

        .search-result-item:hover {
            background-color: var(--code-bg);
        }

        .search-result-item:last-child {
            border-bottom: none;
        }

        .toc {
            background-color: var(--code-bg);
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
        }

        .toc h2 {
            margin-bottom: 15px;
        }

        .toc ul {
            list-style: none;
            columns: 2;
            column-gap: 20px;
        }

        .toc li {
            margin-bottom: 8px;
        }

        .toc a {
            color: var(--link-color);
            text-decoration: none;
        }

        .toc a:hover {
            text-decoration: underline;
        }

        main {
            margin-bottom: 50px;
        }

        .module {
            margin-bottom: 50px;
            padding: 30px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background-color: var(--bg-color);
        }

        .module h2 {
            font-size: 2em;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid var(--primary-color);
        }

        .module-desc {
            font-size: 1.1em;
            margin-bottom: 25px;
            color: #6b7280;
        }

        .types-section, .functions-section {
            margin-top: 30px;
        }

        h3 {
            font-size: 1.5em;
            margin-bottom: 20px;
            color: var(--primary-color);
        }

        h4 {
            font-size: 1.2em;
            margin-bottom: 10px;
        }

        .type-doc, .function-doc {
            margin-bottom: 30px;
            padding: 20px;
            background-color: var(--code-bg);
            border-radius: 8px;
            border-left: 4px solid var(--primary-color);
        }

        code {
            background-color: var(--code-bg);
            padding: 2px 6px;
            border-radius: 3px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.9em;
        }

        pre {
            background-color: var(--code-bg);
            padding: 15px;
            border-radius: 5px;
            overflow-x: auto;
            margin: 10px 0;
        }

        pre code {
            background-color: transparent;
            padding: 0;
        }

        .deprecated {
            background-color: var(--deprecated-bg);
            border-left: 4px solid var(--deprecated-border);
            padding: 12px;
            margin: 10px 0;
            border-radius: 4px;
            font-weight: bold;
        }

        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 3px;
            font-size: 0.85em;
            font-weight: 600;
            margin-left: 5px;
        }

        .badge.optional {
            background-color: #dbeafe;
            color: #1e40af;
        }

        .badge.readonly {
            background-color: #fef3c7;
            color: #92400e;
        }

        @media (prefers-color-scheme: dark) {
            .badge.optional {
                background-color: #1e3a8a;
                color: #bfdbfe;
            }

            .badge.readonly {
                background-color: #78350f;
                color: #fef3c7;
            }
        }

        ul {
            margin-left: 20px;
            margin-bottom: 10px;
        }

        li {
            margin-bottom: 5px;
        }

        .parameters, .properties, .methods, .constructors, .returns, .notes, .examples {
            margin: 15px 0;
        }

        .version {
            font-style: italic;
            color: #6b7280;
            margin-top: 10px;
        }

        footer {
            text-align: center;
            padding: 30px 0;
            border-top: 2px solid var(--border-color);
            color: #6b7280;
        }

        @media (max-width: 768px) {
            .toc ul {
                columns: 1;
            }

            h1 {
                font-size: 2em;
            }

            .module {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
<div class="container">
<header>
<h1>Rhai API Documentation</h1>
<p class="subtitle">Complete API reference for the KeyRx scripting engine</p>
</header>

<div class="search-container">
<input type="text" id="search-input" placeholder="Search functions, types, and descriptions..." />
<div id="search-results"></div>
</div>

<nav class="toc">
<h2>Table of Contents</h2>
<ul>
</ul>
</nav>

<main>
</main>
<footer>
<p>Generated by KeyRx Documentation Generator</p>
</footer>
</div>
<script>
        // Search functionality
        const searchInput = document.getElementById('search-input');
        const searchResults = document.getElementById('search-results');

        // Build search index from all content
        const buildSearchIndex = () => {
            const index = [];

            // Index all functions
            document.querySelectorAll('.function-doc').forEach(func => {
                const heading = func.querySelector('h4');
                const description = func.querySelector('p');
                if (heading && description) {
                    const module = func.closest('.module');
                    const moduleName = module ? module.querySelector('h2').textContent : '';

                    index.push({
                        type: 'function',
                        name: heading.textContent.trim(),
                        description: description.textContent.trim(),
                        module: moduleName,
                        element: func
                    });
                }
            });

            // Index all types
            document.querySelectorAll('.type-doc').forEach(type => {
                const heading = type.querySelector('h4');
                const description = type.querySelector('p');
                if (heading && description) {
                    const module = type.closest('.module');
                    const moduleName = module ? module.querySelector('h2').textContent : '';

                    index.push({
                        type: 'type',
                        name: heading.textContent.trim(),
                        description: description.textContent.trim(),
                        module: moduleName,
                        element: type
                    });
                }
            });

            return index;
        };

        const searchIndex = buildSearchIndex();

        // Search function
        const search = (query) => {
            if (!query || query.length < 2) {
                searchResults.classList.remove('show');
                return;
            }

            const lowerQuery = query.toLowerCase();
            const results = searchIndex.filter(item => {
                return item.name.toLowerCase().includes(lowerQuery) ||
                       item.description.toLowerCase().includes(lowerQuery) ||
                       item.module.toLowerCase().includes(lowerQuery);
            });

            displaySearchResults(results);
        };

        // Display search results
        const displaySearchResults = (results) => {
            searchResults.innerHTML = '';

            if (results.length === 0) {
                searchResults.innerHTML = '<div class="search-result-item">No results found</div>';
                searchResults.classList.add('show');
                return;
            }

            results.slice(0, 10).forEach(result => {
                const item = document.createElement('div');
                item.className = 'search-result-item';
                item.innerHTML = `
                    <strong>${result.name}</strong><br>
                    <small>${result.module} • ${result.type}</small><br>
                    <small style="color: #6b7280;">${result.description.substring(0, 100)}...</small>
                `;

                item.addEventListener('click', () => {
                    result.element.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    result.element.style.backgroundColor = 'var(--primary-color)';
                    result.element.style.transition = 'background-color 0.3s';
                    setTimeout(() => {
                        result.element.style.backgroundColor = '';
                    }, 1000);
                    searchResults.classList.remove('show');
                    searchInput.value = '';
                });

                searchResults.appendChild(item);
            });

            searchResults.classList.add('show');
        };

        // Event listeners
        searchInput.addEventListener('input', (e) => {
            search(e.target.value);
        });

        searchInput.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                searchResults.classList.remove('show');
                searchInput.value = '';
            }
        });

        // Close search results when clicking outside
        document.addEventListener('click', (e) => {
            if (!searchInput.contains(e.target) && !searchResults.contains(e.target)) {
                searchResults.classList.remove('show');
            }
        });

        // Syntax highlighting for code blocks (simple implementation)
        document.querySelectorAll('code.language-rhai').forEach(block => {
            const text = block.textContent;
            const keywords = ['let', 'const', 'fn', 'if', 'else', 'for', 'while', 'return', 'true', 'false', 'null'];

            let highlighted = text;
            keywords.forEach(keyword => {
                const regex = new RegExp(`\\b(${keyword})\\b`, 'g');
                highlighted = highlighted.replace(regex, '<span style="color: #7c3aed; font-weight: bold;">$1</span>');
            });

            // Highlight strings
            highlighted = highlighted.replace(/(".*?")/g, '<span style="color: #059669;">$1</span>');
            highlighted = highlighted.replace(/('.*?')/g, '<span style="color: #059669;">$1</span>');

            // Highlight comments
            highlighted = highlighted.replace(/(\/\/.*$)/gm, '<span style="color: #6b7280; font-style: italic;">$1</span>');

            // Highlight numbers
            highlighted = highlighted.replace(/\b(\d+)\b/g, '<span style="color: #dc2626;">$1</span>');

            block.innerHTML = highlighted;
        });
    </script>
</body>
</html>
