# cargo-nextest configuration
# https://nexte.st/book/configuration.html

[profile.default]
retries = 0
slow-timeout = "60s"
fail-fast = true

[profile.ci]
retries = 2
fail-fast = false
slow-timeout = "120s"

# Test category profiles for parallel execution
[profile.ci-unit]
retries = 2
fail-fast = false
slow-timeout = "60s"

[profile.ci-integration]
retries = 2
fail-fast = false
slow-timeout = "180s"

[profile.ci-e2e]
retries = 2
fail-fast = false
slow-timeout = "300s"
