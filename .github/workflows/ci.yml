name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  check:
    name: Check (fmt + clippy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: core -> target
          # Improve cache efficiency with shared key
          shared-key: check
          cache-on-failure: true
      - name: Check formatting
        run: cargo fmt --check
        working-directory: ./core
      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
        working-directory: ./core

  check-dart-bindings:
    name: Check Dart Bindings
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: core -> target
          shared-key: check-dart-bindings
          cache-on-failure: true
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: stable
          cache: true
      - name: Build binding generator
        run: cargo build --release --manifest-path core/tools/generate_dart_bindings/Cargo.toml
      - name: Check bindings are up-to-date
        run: |
          cargo run --release --manifest-path core/tools/generate_dart_bindings/Cargo.toml -- --check --verbose
        env:
          RUST_BACKTRACE: 1
      - name: Show diff if bindings are stale
        if: failure()
        run: |
          echo "Bindings are out of date. Regenerating to show diff..."
          cargo run --release --manifest-path core/tools/generate_dart_bindings/Cargo.toml -- --verbose
          git diff --color=always
          echo ""
          echo "::error::Dart FFI bindings are out of sync with contracts. Run 'just gen-dart-bindings' locally and commit the changes."

  test-unit:
    name: Unit Tests (${{ matrix.os }})
    needs: check
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: core -> target
          shared-key: test-unit-${{ matrix.os }}
          cache-on-failure: true
      - name: Install nextest
        uses: taiki-e/install-action@nextest
      - name: Run unit tests
        run: cargo nextest run --all-features --profile ci-unit --filter-expr 'test(unit)'
        working-directory: ./core

  test-integration:
    name: Integration Tests (${{ matrix.os }})
    needs: check
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: core -> target
          shared-key: test-integration-${{ matrix.os }}
          cache-on-failure: true
      - name: Install nextest
        uses: taiki-e/install-action@nextest
      - name: Run integration tests
        run: cargo nextest run --all-features --profile ci-integration --filter-expr 'test(integration)'
        working-directory: ./core

  test-e2e:
    name: E2E Tests
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: core -> target
          shared-key: test-e2e
          cache-on-failure: true
      - name: Install nextest
        uses: taiki-e/install-action@nextest
      - name: Run e2e tests
        run: cargo nextest run --all-features --profile ci-e2e --filter-expr 'test(e2e)'
        working-directory: ./core

  test-doc-examples:
    name: Test Documentation Examples
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: core -> target
          shared-key: doc-examples
          cache-on-failure: true
      - name: Run documentation example tests
        run: cargo test --test doc_examples_test -- --nocapture
        working-directory: ./core

  uat:
    name: UAT Tests
    needs: [test-unit, test-integration, test-e2e]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: core -> target
          shared-key: uat
          cache-on-failure: true
      - name: Build
        run: cargo build --release
        working-directory: ./core
      - name: Run UAT tests
        run: cargo run --release --bin keyrx -- uat --gate default
        working-directory: ./core
      - name: Run regression tests
        run: cargo run --release --bin keyrx -- regression
        working-directory: ./core

  test-flutter:
    name: Test Flutter
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: stable
          cache: true
      - name: Verify FFI Bindings
        run: python3 scripts/verify_bindings.py
        working-directory: .
      - name: Install dependencies
        run: flutter pub get
        working-directory: ./ui
      - name: Analyze
        run: flutter analyze --fatal-infos
        working-directory: ./ui
      - name: Run tests
        run: flutter test --coverage
        working-directory: ./ui
      - name: Upload Flutter coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./ui/coverage/lcov.info
          flags: flutter
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  coverage:
    name: Coverage
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: core -> target
          shared-key: coverage
          cache-on-failure: true
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
      - name: Generate coverage report
        run: |
          cargo llvm-cov --all-features --lcov --output-path lcov.info
          cargo llvm-cov --all-features --html
          cargo llvm-cov --all-features --text | tee coverage-summary.txt
        working-directory: ./core
      - name: Check coverage threshold
        run: cargo llvm-cov --all-features --fail-under-lines 80
        working-directory: ./core
      - name: Upload HTML coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: core/target/llvm-cov/html/
          retention-days: 30
      - name: Upload coverage summary
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-summary
          path: core/coverage-summary.txt
          retention-days: 30
      - name: Comment PR with coverage report
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        with:
          script: |
            const fs = require('fs');
            const summary = fs.readFileSync('core/coverage-summary.txt', 'utf8');
            const body = `## Coverage Report\n\n\`\`\`\n${summary}\n\`\`\`\n\n📊 [Full HTML Report](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./core/lcov.info
          flags: rust
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  security:
    name: Security Audit
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Audit dependencies
        uses: rustsec/audit-check@v2.0.0
        with:
          working-directory: ./core
          token: ${{ secrets.GITHUB_TOKEN }}

  benchmark:
    name: Benchmark
    if: github.event_name == 'pull_request'
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: core -> target
          shared-key: benchmark
          cache-on-failure: true
      - name: Run benchmarks
        run: cargo bench --all-features -- --noplot
        working-directory: ./core
      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: core/target/criterion
          retention-days: 7
