name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  check:
    name: Check (fmt + clippy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: core -> target
      - name: Check formatting
        run: cargo fmt --check
        working-directory: ./core
      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
        working-directory: ./core

  test:
    name: Test (${{ matrix.os }})
    needs: check
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: core -> target
      - name: Install nextest
        uses: taiki-e/install-action@nextest
      - name: Run tests
        run: cargo nextest run --all-features --profile ci
        working-directory: ./core

  uat:
    name: UAT Tests
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: core -> target
      - name: Build
        run: cargo build --release
        working-directory: ./core
      - name: Run UAT tests
        run: cargo run --release --bin keyrx -- uat --gate default
        working-directory: ./core
      - name: Run regression tests
        run: cargo run --release --bin keyrx -- regression
        working-directory: ./core

  test-flutter:
    name: Test Flutter
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: stable
          cache: true
      - name: Install dependencies
        run: flutter pub get
        working-directory: ./ui
      - name: Analyze
        run: flutter analyze --fatal-infos
        working-directory: ./ui
      - name: Run tests
        run: flutter test --coverage
        working-directory: ./ui
      - name: Upload Flutter coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./ui/coverage/lcov.info
          flags: flutter
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  coverage:
    name: Coverage
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: core -> target
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
      - name: Generate coverage
        run: cargo llvm-cov --all-features --lcov --output-path lcov.info
        working-directory: ./core
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./core/lcov.info
          flags: rust
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  security:
    name: Security Audit
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Audit dependencies
        uses: rustsec/audit-check@v2.0.0
        with:
          working-directory: ./core
          token: ${{ secrets.GITHUB_TOKEN }}

  benchmark:
    name: Benchmark
    if: github.event_name == 'pull_request'
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: core -> target
      - name: Run benchmarks
        run: cargo bench --all-features -- --noplot
        working-directory: ./core
      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: core/target/criterion
          retention-days: 7
