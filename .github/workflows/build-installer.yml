name: Build Windows Installer

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  build-installer:
    name: Build Windows Installer
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: keyrx_ui/package-lock.json

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Install npm dependencies
        working-directory: keyrx_ui
        run: npm ci

      - name: Extract version from Cargo.toml
        id: version
        shell: powershell
        run: |
          $ver = (Select-String -Path "Cargo.toml" -Pattern '^version\s*=\s*"([^"]+)"' | Select-Object -First 1).Matches.Groups[1].Value
          echo "VERSION=$ver" >> $env:GITHUB_OUTPUT
          Write-Host "Version: $ver"

      - name: Build Rust binaries (release)
        run: |
          cargo build --release --bin keyrx_daemon
          cargo build --release --bin keyrx_compiler

      - name: Build UI
        working-directory: keyrx_ui
        run: npm run build

      - name: Build Inno Setup Installer
        shell: powershell
        run: |
          iscc /DAppVersion=${{ steps.version.outputs.VERSION }} keyrx-installer.iss

      - name: Calculate checksums
        shell: powershell
        run: |
          $version = "${{ steps.version.outputs.VERSION }}"
          $installerPath = "installer-output\keyrx-setup-v$version-windows-x64.exe"

          if (Test-Path $installerPath) {
            $hash = Get-FileHash $installerPath -Algorithm SHA256
            "SHA256 ($installerPath) = $($hash.Hash)" | Out-File -FilePath "installer-output\checksums.txt"
            Get-Content "installer-output\checksums.txt"
          } else {
            Write-Error "Installer not found: $installerPath"
            exit 1
          }

      - name: Upload Installer
        uses: actions/upload-artifact@v4
        with:
          name: keyrx-installer
          path: installer-output/keyrx-setup-v*.exe
          if-no-files-found: error

      - name: Upload Checksums
        uses: actions/upload-artifact@v4
        with:
          name: installer-checksums
          path: installer-output/checksums.txt

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            installer-output/keyrx-setup-v*.exe
            installer-output/checksums.txt
          body: |
            # KeyRx ${{ steps.version.outputs.VERSION }}

            ## Windows Installer

            1. Download `keyrx-setup-v${{ steps.version.outputs.VERSION }}-windows-x64.exe`
            2. Run as Administrator
            3. Follow installation prompts

            ## Verification

            ```powershell
            Get-FileHash keyrx-setup-v${{ steps.version.outputs.VERSION }}-windows-x64.exe -Algorithm SHA256
            ```

            Compare with `checksums.txt`.

            ## Requirements

            - Windows 10 version 1809+ (64-bit)
            - Administrator privileges
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Summary
        shell: powershell
        run: |
          $version = "${{ steps.version.outputs.VERSION }}"
          $path = "installer-output\keyrx-setup-v$version-windows-x64.exe"
          if (Test-Path $path) {
            $size = [Math]::Round((Get-Item $path).Length / 1MB, 2)
            Write-Host "Installer: $path ($size MB)" -ForegroundColor Green
          }
