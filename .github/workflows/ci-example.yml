# Example GitHub Actions CI workflow demonstrating binding verification
#
# This workflow shows how to integrate FFI binding verification into CI/CD.
# It runs on pull requests and pushes to main branch.

name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always

jobs:
  # Verify Rust code quality
  rust-checks:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt, clippy

    - name: Cache Cargo registry
      uses: actions/cache@v3
      with:
        path: ~/.cargo/registry
        key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

    - name: Cache Cargo index
      uses: actions/cache@v3
      with:
        path: ~/.cargo/git
        key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

    - name: Cache Cargo build
      uses: actions/cache@v3
      with:
        path: core/target
        key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

    - name: Check Rust formatting
      run: cd core && cargo fmt --check

    - name: Run Clippy
      run: cd core && cargo clippy -- -D warnings

    - name: Run tests
      run: cd core && cargo test

  # Verify FFI bindings are in sync
  bindings-check:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Verify FFI bindings are in sync
      run: python3 scripts/verify_bindings.py

    - name: Check for uncommitted binding changes
      if: failure()
      run: |
        echo "::error::FFI bindings are out of sync!"
        echo "::error::Run 'just gen-bindings' locally and commit the changes."
        exit 1

  # Build the project
  build:
    runs-on: ubuntu-latest
    needs: [rust-checks, bindings-check]
    steps:
    - uses: actions/checkout@v4

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'

    - name: Install just
      run: cargo install just

    - name: Generate error documentation
      run: just docs-errors

    - name: Generate FFI bindings
      run: just gen-bindings

    - name: Build Rust core
      run: cd core && cargo build --release

    - name: Prepare Flutter UI
      run: cd ui && flutter pub get

    - name: Upload artifacts
      uses: actions/upload-artifact@v3
      with:
        name: keyrx-build
        path: |
          core/target/release/libkeyrx_core.so
          core/target/release/libkeyrx_core.dylib
          core/target/release/keyrx_core.dll
        if-no-files-found: ignore
